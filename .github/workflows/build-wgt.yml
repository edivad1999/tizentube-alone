name: Build unsigned WGT

on:
  push:
    branches: [main, master]
    tags: ['v*']
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout this repo
        uses: actions/checkout@v4

      - name: Checkout TizenTube source
        uses: actions/checkout@v4
        with:
          repository: reisxd/TizenTube
          path: tizentube-src

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build userScript
        working-directory: tizentube-src/mods
        run: npm ci && npm run build

      - name: Overlay modified service.js and build service
        run: |
          cp service/service.js tizentube-src/service/service.js
          cd tizentube-src/service && npm ci && npx rollup -c rollup.config.js

      - name: Gather build artifacts
        run: |
          mkdir -p dist
          cp tizentube-src/dist/userScript.js dist/
          cp tizentube-src/dist/service.js    dist/

      - name: Cache Tizen Studio
        id: tizen-cache
        uses: actions/cache@v4
        with:
          path: ~/tizen-studio
          key: tizen-studio-5.6-ubuntu

      - name: Install Tizen Studio CLI
        if: steps.tizen-cache.outputs.cache-hit != 'true'
        run: |
          curl -fSL -o tizen-installer.bin \
            "https://download.tizen.org/sdk/Installer/tizen-studio_5.6/web-cli_Tizen_Studio_5.6_ubuntu-64.bin"
          chmod +x tizen-installer.bin
          ./tizen-installer.bin -- --accept-license "$HOME/tizen-studio"
          rm tizen-installer.bin

      - name: Add Tizen CLI to PATH
        run: echo "$HOME/tizen-studio/tools/ide/bin" >> "$GITHUB_PATH"

      - name: Prepare tizen-app directory
        run: |
          mkdir -p tizen-app/service
          cp dist/userScript.js tizen-app/
          cp dist/service.js    tizen-app/service/
          # Use TizenBrew icon as placeholder
          curl -fSL -o tizen-app/icon.png \
            "https://raw.githubusercontent.com/reisxd/TizenBrew/main/tizenbrew-app/TizenBrew/icon.png" \
            || echo "Icon download failed — add tizen-app/icon.png manually"

      - name: tizen build-web
        run: |
          tizen build-web \
            -e ".*" \
            -e "node_modules/*" \
            -e "package*.json" \
            -- tizen-app

      - name: Package unsigned WGT
        run: |
          mkdir -p release
          cd tizen-app/.buildResult
          zip -r "$GITHUB_WORKSPACE/release/TizenTubeStandalone.wgt" .

      - name: Upload WGT artifact
        uses: actions/upload-artifact@v4
        with:
          name: TizenTubeStandalone-wgt
          path: release/TizenTubeStandalone.wgt
          retention-days: 30

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: release/TizenTubeStandalone.wgt
          body: |
            ## TizenTube Standalone — unsigned WGT

            Download `TizenTubeStandalone.wgt` and follow the steps in [INSTALL.md](INSTALL.md) to sign and sideload it on your Samsung TV.

            **This file is unsigned.** You must re-sign it with your own Samsung developer certificate before installation.
