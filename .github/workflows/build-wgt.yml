name: Build and Release WGT

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout this repo
        uses: actions/checkout@v4

      - name: Checkout TizenTube source
        uses: actions/checkout@v4
        with:
          repository: reisxd/TizenTube
          path: tizentube-src

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build userScript
        working-directory: tizentube-src/mods
        run: npm ci && npm run build

      - name: Overlay modified service.js and build service
        run: |
          cp service/service.js tizentube-src/service/service.js
          cd tizentube-src/service && npm ci && npx rollup -c rollup.config.js

      - name: Prepare tizen-app with built artifacts
        run: |
          mkdir -p tizen-app/service
          cp tizentube-src/dist/service.js tizen-app/service/

      - name: Package unsigned WGT
        run: |
          mkdir -p release
          cd tizen-app
          zip -r ../release/TizenTubeStandalone.wgt . \
            --exclude ".*" \
            --exclude "node_modules/*" \
            --exclude "package*.json" \
            --exclude ".buildResult/*"

      - name: Bundle PC server with userScript
        run: |
          mkdir -p release/server
          cp server/index.js      release/server/
          cp server/package.json  release/server/
          cp tizentube-src/dist/userScript.js release/server/../dist/userScript.js 2>/dev/null || \
            (mkdir -p release/dist && cp tizentube-src/dist/userScript.js release/dist/userScript.js)
          cd release && zip -r TizenTubeServer.zip server/ dist/

      - name: Upload WGT artifact
        uses: actions/upload-artifact@v4
        with:
          name: TizenTubeStandalone-wgt
          path: release/TizenTubeStandalone.wgt
          retention-days: 30

      - name: Bump version tag
        if: github.event_name != 'pull_request'
        id: tag
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          default_bump: patch
          tag_prefix: v

      - name: Create GitHub Release
        if: github.event_name != 'pull_request'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.new_tag }}
          name: ${{ steps.tag.outputs.new_tag }}
          body: |
            ## TizenTube Standalone ${{ steps.tag.outputs.new_tag }}

            Download `TizenTubeStandalone.wgt` and follow [INSTALL.md](INSTALL.md) to sign and sideload.

            **Unsigned** — re-sign locally: `tizen package -t wgt -s <your-profile> -- TizenTubeStandalone.wgt`

            ${{ steps.tag.outputs.changelog }}
          files: |
            release/TizenTubeStandalone.wgt
            release/TizenTubeServer.zip

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        if: github.event_name != 'pull_request'
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ steps.tag.outputs.new_tag }}

      - name: Build Docker image (PR check only)
        if: github.event_name == 'pull_request'
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
